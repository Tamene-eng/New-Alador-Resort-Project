<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Alador Resort{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Core styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Additional project styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='hero-parallax.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='carousel.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='lightbox.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

    <!-- Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🧠 Page-Specific Head Content -->
    {% block extra_head %}{% endblock %}
</head>

<body class="{% if weather and weather.weather %}{{ weather.weather[0].main | lower }}{% else %}default{% endif %}">

<!-- 🎨 Seasonal Backgrounds -->
<style>
    body.rain    { background: linear-gradient(to right, #3e5151, #decba4); }
    body.sun     { background: linear-gradient(to right, #fceabb, #f8b500); }
    body.clouds  { background: linear-gradient(to right, #d7d2cc, #304352); }
    body.clear   { background: linear-gradient(to right, #a1c4fd, #c2e9fb); }
    body.default { background: #f8f9fa; }
</style>

<!-- 🔝 Global Includes -->
{% include 'navbar.html' %}
{% include 'toast.html' %}
{% include 'seasonal_header.html' %}
{% include 'promo_modal.html' %}
{% include 'flash_messages.html' %}

<!-- 📄 Page Content -->
<main role="main" class="container-fluid px-4">
    {% block content %}{% endblock %}
</main>

<!-- 🔚 Footer -->
{% include 'footer.html' %}

<!-- 📦 JS Assets -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<!-- Provide server weather to front-end consumers (optional) -->
<script>
    window.__weather = {{ weather|tojson|safe if weather else 'null' }};
</script>

<!-- Module scripts -->
<script type="module" src="{{ url_for('static', filename='theme.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='theme-loader.js') }}"></script>

<!-- 🧠 Page-Specific Scripts -->
{% block extra_scripts %}{% endblock %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
