<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact ResortName</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<!-- 🧭 Navigation -->
<header>
    <nav class="navbar">
        <div class="logo">🌴 ResortName</div>
        <div class="hamburger">&#9776;</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.index') }}">Home</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="{{ url_for('main.about') }}">About</a></li>
            <li><a href="{{ url_for('main.contact') }}">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- 📝 Contact Section -->
<section id="contact" class="contact-section">
    <h1>Get in Touch</h1>

    <form action="{{ url_for('main.contact') }}" method="POST" class="contact-form">


        <fieldset>
            <legend>Message Details</legend>

            <label for="name"><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name..." required>

            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="subject"><i class="fas fa-tag"></i> Subject</label>
            <input type="text" id="subject" name="subject" placeholder="e.g. Booking Inquiry">

            <label for="message"><i class="fas fa-comment-dots"></i> Your Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

            <button type="submit"><i class="fas fa-paper-plane"></i> Send Message</button>
        </fieldset>
    </form>

    {% if request.method == "POST" %}
    <div class="toast">✅ Thank you for reaching out! We’ll be in touch soon.</div>
    {% endif %}

    <!-- 📍 Optional Resort Map -->
    <div class="location-map">
        <h2>📍 Our Location</h2>
        <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="250" style="border:0;"
                allowfullscreen></iframe>
    </div>

    <!-- ☎️ Quick Contact Links -->
    <div class="contact-links">
        <p><i class="fas fa-phone-alt"></i> <a href="tel:+251-984-101-011">+251 984 101 011</a></p>
        <p><i class="fas fa-envelope"></i> <a href="mailto:info@resortname.com">info@resortname.com</a></p>
        <p><i class="fab fa-whatsapp"></i> <a href="https://wa.me/251123456789">Chat on WhatsApp</a></p>
    </div>
</section>

<a href="{{ url_for('static', filename='hero_parallax.css') }}" class="floating-btn" title="Back to Top">⬆</a>
<script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
