<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <style>
        body {
          background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
          font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        h2 {
          color: #00796b;
          text-align: center;
          margin-bottom: 20px;
        }
        form {
          max-width: 400px;
          margin: 20px auto;
          padding: 20px;
          background: #fafafa;
          border-radius: 8px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        label {
          display: block;
          margin-top: 10px;
          font-weight: bold;
        }
        input {
          width: 100%;
          padding: 8px;
          margin-top: 4px;
          border: 1px solid #ccc;
          border-radius: 6px;
          transition: all 0.3s ease-in-out;
        }
        input:focus {
          border-color: #00796b;
          outline: none;
        }
        button {
          margin-top: 15px;
          padding: 10px;
          width: 100%;
          border: none;
          background-color: #00796b;
          color: white;
          font-weight: bold;
          border-radius: 6px;
          cursor: pointer;
        }
        button:hover {
          background-color: #004d40;
        }
        .flash-message.success {
          background-color: #c8e6c9;
          color: #2e7d32;
          padding: 10px;
          border-radius: 6px;
          margin-bottom: 10px;
          opacity: 0;
          animation: fadeIn 1s forwards;
        }
        .flash-message.error {
          background-color: #ffcdd2;
          color: #c62828;
          padding: 10px;
          border-radius: 6px;
          margin-bottom: 10px;
          opacity: 0;
          animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(-10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .toggle-eye {
          cursor: pointer;
          display: inline-block;
          margin-top: 6px;
          color: #00796b;
        }
    </style>
</head>

<body>
<main>

    <!-- ✅ Display Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash-message {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- 🔐 Login Section -->
    <section id="login">
        <h2>Welcome Back</h2>
        <form method="POST" action="{{ url_for('main.login') }}">
            <label for="login-username">Username:</label>
            <input type="text" name="username" id="login-username" required>

            <label for="login-password">Password:</label>
            <input type="password" name="password" id="login-password" required>
            <span class="toggle-eye" onclick="togglePassword('login-password')">👁️ Show</span>

            <button type="submit">Login</button>
        </form>
    </section>

    <!-- ✨ Registration Section -->
    <section id="register">
        <h2>Create Your Account</h2>
        <form method="POST" action="{{ url_for('main.register', filenmae='register.html') }}">
            <label for="reg-username">Username:</label>
            <input type="text" name="username" id="reg-username" required>

            <label for="reg-email">Email:</label>
            <input type="email" name="email" id="reg-email" required>

            <label for="reg-password">Password:</label>
            <input type="password" name="password" id="reg-password" required>
            <span class="toggle-eye" onclick="togglePassword('reg-password')">👁️ Show</span>

            <button type="submit">Register</button>
        </form>
    </section>

</main>

<!-- 🔧 Password Toggle Script -->
<script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }
</script>
<script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
