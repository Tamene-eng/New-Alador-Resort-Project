<section class="container my-5" id="comments">
    <h2 class="mb-3">Guest Comments</h2>
    <form id="commentForm" class="row g-3">
        <div class="col-md-4">
            <label for="cname">Your Name</label>
            <input class="form-control" id="cname" placeholder="Your name" type="text" required>
        </div>
        <div class="col-md-6">
            <label for="ctext">Your comment</label>
            <input class="form-control" id="ctext" placeholder="Your comment" type="text" required>
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Post</button>
        </div>
    </form>
    <ul id="commentList" class="list-group mt-3"></ul>
    <script>
        (function() {
          const list = document.getElementById('commentList');
          const form = document.getElementById('commentForm');

          async function fetchComments() {
            const res = await fetch('/api/comments');
            return res.ok ? res.json() : [];
          }
          function render(items) {
            list.innerHTML = '';
            items.forEach(({name, text, created_at}) => {
              const li = document.createElement('li');
              li.className = 'list-group-item d-flex justify-content-between align-items-start';
              li.innerHTML = `<div><strong>${name}</strong><div class="small text-muted">${new Date(created_at).toLocaleString()}</div><div>${text}</div></div>`;
              list.appendChild(li);
            });
          }

          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cname').value.trim();
            const text = document.getElementById('ctext').value.trim();
            if (!name || !text) return;

            const res = await fetch('/api/comments', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': '{{ csrf_token }}'
              },
              body: JSON.stringify({ name, text })
            });
            if (res.ok) {
              form.reset();
              const items = await fetchComments();
              render(items);
            }
          });

          // initial load
          fetchComments().then(render);
        })();
    </script>
</section>
