<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font & Seasonal Preview</title>
  <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #fdfdfd;
      text-align: center;
      padding: 2rem;
    }

    .header {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .winter {
      color: #004e7c;
      background-image: url('/static/images/header_winter.jpg');
      background-size: cover;
      padding: 2rem;
    }

    .summer {
      color: #d97706;
      background-image: url('/static/images/header_summer.jpg');
      background-size: cover;
      padding: 2rem;
    }

    .autumn {
      color: #92400e;
      background-color: #f6e9d7;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="header winter">❄️ Cozy Winter Wishes from Alador Resort</div>
  <div class="header summer">☀️ Bright Summer Days Await You</div>
  <div class="header autumn">🍂 Discover Comfort in Every Season</div>
<script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
