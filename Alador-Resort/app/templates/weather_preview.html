<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Preview</title><link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            background: url('{{ url_for('static', filename='images/weather-bg.jpg') }}') no-repeat center center fixed;
            background-size: cover;
            transition: background-position 0.2s ease;
        }
        .header {
            text-align: center;
            font-size: 1.2rem;
            margin: 20px;
        }
        h1, h2 {
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
        }
        iframe {
            display: block;
            margin: 30px auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="{{ weather_condition }}">

    <div class="header">
        🌤️ Current Weather: {{ weather.condition }}
        <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
             alt="{{ weather.condition }} icon"
             style="vertical-align: middle; height: 48px;">
    </div>

    <h1>🌡️ Weather in {{ weather.location }}: {{ weather.temperature }}°C</h1>
    <h2>{{ weather.condition }}</h2>

    <iframe
        width="90%"
        height="300"
        frameborder="0"
        style="border:0"
        src="https://www.google.com/maps?q={{ weather.location | urlencode }}&output=embed"
        allowfullscreen>
    </iframe>

    <script>
        window.addEventListener('scroll', function() {
            const offset = window.scrollY * 0.5;
            document.body.style.backgroundPositionY = `${offset}px`;
        });
    </script>
<script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
